name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [workspaces, server, client]
    name: Test (${{ matrix.suite }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run workspace package tests
        if: matrix.suite == 'workspaces'
        run: npm run test --workspaces --if-present
        shell: bash

      - name: Run server tests
        if: matrix.suite == 'server'
        run: npm run test:server
        shell: bash

      - name: Run client tests
        if: matrix.suite == 'client'
        run: npm run test:client
        shell: bash

  build-cli:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') && success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build CLI binaries
        run: npm run cli:build:binaries

      - name: Smoke test Linux CLI binary
        shell: bash
        run: |
          set -euo pipefail

          BIN="$(find dist/cli -maxdepth 1 -type f | grep -E 'linux|Linux' | head -n 1 || true)"
          if [[ -z "$BIN" ]]; then
            echo "Linux CLI binary not found in dist/cli"
            exit 1
          fi
          chmod +x "$BIN"

          export PORT=19091
          node -e "require('http').createServer((req,res)=>{res.writeHead(200, {'content-type':'application/json'});res.end(JSON.stringify({ok:true}));}).listen(process.env.PORT,'127.0.0.1')" &
          SERVER_PID=$!
          trap 'kill $SERVER_PID >/dev/null 2>&1 || true' EXIT
          for i in {1..25}; do
            if curl -fsS "http://127.0.0.1:${PORT}/ping" >/dev/null; then
              break
            fi
            if [[ "$i" -eq 25 ]]; then
              echo "Smoke server did not become ready on 127.0.0.1:${PORT}"
              exit 1
            fi
            sleep 0.2
          done

          mkdir -p .tmp-cli-smoke
          cp packages/server/fixtures/cli/collection-success.json .tmp-cli-smoke/collection.json

          cat > .tmp-cli-smoke/environment.json <<JSON
          {
            "name": "CI",
            "values": [
              { "key": "baseUrl", "value": "http://127.0.0.1:${PORT}", "enabled": true }
            ]
          }
          JSON

          "$BIN" run .tmp-cli-smoke/collection.json -e .tmp-cli-smoke/environment.json --reporter json --no-color > .tmp-cli-smoke/report.json
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('.tmp-cli-smoke/report.json','utf8')); if (report.summary.failed!==0 || report.summary.errors!==0) { console.error(report.summary); process.exit(1); }"

          rm -rf .tmp-cli-smoke

      - name: Upload CLI binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: dist/cli/*
          retention-days: 1

      - name: Upload CLI binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cli/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoke-cli-mac:
    runs-on: macos-latest
    needs: build-cli
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v') && success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist/cli

      - name: Smoke test macOS CLI binary
        shell: bash
        run: |
          set -euo pipefail

          BIN="$(find dist/cli -maxdepth 1 -type f | grep -E 'macos|darwin|MacOS|macOS' | head -n 1 || true)"
          if [[ -z "$BIN" ]]; then
            echo "macOS CLI binary not found in dist/cli"
            exit 1
          fi
          chmod +x "$BIN"

          export PORT=19092
          node -e "require('http').createServer((req,res)=>{res.writeHead(200, {'content-type':'application/json'});res.end(JSON.stringify({ok:true}));}).listen(process.env.PORT,'127.0.0.1')" &
          SERVER_PID=$!
          trap 'kill $SERVER_PID >/dev/null 2>&1 || true' EXIT
          for i in {1..25}; do
            if curl -fsS "http://127.0.0.1:${PORT}/ping" >/dev/null; then
              break
            fi
            if [[ "$i" -eq 25 ]]; then
              echo "Smoke server did not become ready on 127.0.0.1:${PORT}"
              exit 1
            fi
            sleep 0.2
          done

          mkdir -p .tmp-cli-smoke
          cp packages/server/fixtures/cli/collection-success.json .tmp-cli-smoke/collection.json

          cat > .tmp-cli-smoke/environment.json <<JSON
          {
            "name": "CI",
            "values": [
              { "key": "baseUrl", "value": "http://127.0.0.1:${PORT}", "enabled": true }
            ]
          }
          JSON

          "$BIN" run .tmp-cli-smoke/collection.json -e .tmp-cli-smoke/environment.json --reporter json --no-color > .tmp-cli-smoke/report.json
          node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('.tmp-cli-smoke/report.json','utf8')); if (report.summary.failed!==0 || report.summary.errors!==0) { console.error(report.summary); process.exit(1); }"

          rm -rf .tmp-cli-smoke

  smoke-cli-windows:
    runs-on: windows-latest
    needs: build-cli
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v') && success()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: dist/cli

      - name: Smoke test Windows CLI binary
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $bin = Get-ChildItem dist/cli -File | Where-Object { $_.Name -match 'win|windows' } | Select-Object -First 1
          if (-not $bin) {
            throw 'Windows CLI binary not found in dist/cli'
          }

          $port = 19093
          $server = Start-Process node -ArgumentList '-e', "require('http').createServer((req,res)=>{res.writeHead(200, {'content-type':'application/json'});res.end(JSON.stringify({ok:true}));}).listen($port,'127.0.0.1')" -PassThru

          $ready = $false
          for ($i = 0; $i -lt 25; $i++) {
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:$port/ping" -UseBasicParsing -TimeoutSec 1 | Out-Null
              $ready = $true
              break
            } catch {
              Start-Sleep -Milliseconds 200
            }
          }
          if (-not $ready) {
            Stop-Process -Id $server.Id -Force
            throw "Smoke server did not become ready on port $port"
          }

          try {
            New-Item -ItemType Directory -Path .tmp-cli-smoke -Force | Out-Null
            Copy-Item packages/server/fixtures/cli/collection-success.json .tmp-cli-smoke/collection.json

            ('{"name":"CI","values":[{"key":"baseUrl","value":"http://127.0.0.1:' + $port + '","enabled":true}]}') | Set-Content .tmp-cli-smoke/environment.json -Encoding UTF8

            & $bin.FullName run .tmp-cli-smoke/collection.json -e .tmp-cli-smoke/environment.json --reporter json --no-color | Set-Content .tmp-cli-smoke/report.json

            $report = Get-Content .tmp-cli-smoke/report.json | ConvertFrom-Json
            if ($report.summary.failed -ne 0 -or $report.summary.errors -ne 0) {
              throw "Smoke summary failed: failed=$($report.summary.failed) errors=$($report.summary.errors)"
            }
          } finally {
            if ($server -and (Get-Process -Id $server.Id -ErrorAction SilentlyContinue)) {
              Stop-Process -Id $server.Id -Force
            }
            Remove-Item .tmp-cli-smoke -Recurse -Force -ErrorAction SilentlyContinue
          }

  build-mac:
    runs-on: macos-latest
    needs: test
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') && success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_DEVTOOLS: '1'
        run: npm run dist:mac

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    needs: test
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v') && success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_DEVTOOLS: '1'
        run: npm run dist:win

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
